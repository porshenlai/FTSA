<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Alpha Cache 財金數據分析平台</title>
	<style>
		* { box-sizing: border-box; }
		body, html {
			margin: 0;
			padding: 0;
			height: 100%;
			width: 100%;
			overflow: hidden; 
		}

		body {
			display: flex;
			flex-direction: column;
		}

		header {
			height: 60px;
			background: #2c3e50;
			color: white;
			padding: 0 20px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-shrink: 0;
		}

		footer {
			height: 30px;
			background: #ecf0f1;
			text-align: center;
			line-height: 30px;
			font-size: 12px;
			flex-shrink: 0;
		}

		main {
			flex-grow: 1;
			display: flex;
			overflow: hidden;
			background: #f9f9f9;
		}

		/* 側邊控制區基礎樣式 */
		aside[UID='Control'] {
			border: 1px solid #ddd;
			padding: 10px;
			overflow-y: auto;
			background: #fff;
			z-index: 10;
		}

		/* 右側/下方 視圖區基礎樣式 */
		section[UID='View'] {
			flex-direction: column;
			background: white;
			border-left: 1px solid #ddd;
			overflow: hidden auto;
		}

		/* 響應式佈局邏輯修正 */
		@media (orientation: landscape) {
			main { flex-direction: row; }
			
			aside[UID='Control'] {
				flex: 1;
				min-width: 30%;
			}
			
			section[UID='View'] {
				flex: 2;
				min-width: 70%;
				max-width: calc(100vh - 90px); /* 限制最大寬度為高度，維持正方形感 */
			}
		}

		@media (orientation: portrait) {
			main { flex-direction: column; }
			
			aside[UID='Control'] {
				flex: 1;
				min-height: 30%;
			}
			
			section[UID='View'] {
				flex: 2;
				min-height: 70%;
				max-height: 100vw;
			}
		}

		section[UID='Chart'] {
			height: 90%;
			width: 100%;
			overflow: auto hidden;
			border-bottom: 2px solid #eee;
			position: relative;
			background: black;
		}

		section[UID='Table'] {
			min-height: 10%;
			position: relative;
			color: darkgreen; background: white;
			overflow: auto hidden;
		}

		[UID="Canvas"] {
    		transform-origin: 50% 50%; /* center of rotation is set to the center of the element */
    		transform: scale(1,-1);
		}

		.hidden {
			display: none;
		}

		.hint-btn {
			cursor: pointer;
			text-decoration: underline;
			color: #3498db;
		}

		.nvalue { display:flex;justify-content:space-between; }
		[TagValue] { border-bottom:1px solid darkblue; display:flex;justify-content:space-between; }
		[TagValue] button { color:red; }
	</style>
	<script src='data.js'></script>
	<script src='chart.js'></script>
</head>
<body>

<header>
	<div style='font-size:180%'>Financial Series Token Analyzer</div>
	<div>
		<span UID='User'>Porshen Lai</span>
		(<span class="hint-btn" onclick='document.body.UM.manage()' title="點擊進入帳戶管理">管理</span> | 
		<span class="hint-btn" onclick='document.body.UM.logout()' title="點擊登出系統">登出</span>)
	</div>
</header>

<main>
	<aside UID='Control'>
		<div UID="RecordData" style='border:1px solid silver;padding:4px;margin:4px 0;'>
			<div class='nvalue'><b>Date:</b><span fn='D'></span></div>
			<div class='nvalue'><b>Close/Open:</b><span><span fn="C"></span> / <span fn='O'></span></span></div>
			<div class='nvalue'><b>High/Low:</b><span><span fn='H'></span> / <span fn='L'></span></span></div>
			<div class='nvalue'><b>Volume:</b><span fn='V'></span></div>
		</div>
		<div>Zoom: <input UID='ZoomControl' type='number' min='1' step='1' value='1' onchange='App.Chart.zoom(this.value)' style='text-align:center;'></input></div>
		<div UID="ChartTick"
			onchange='App.Chart.syncAPlots(Array.from(this.querySelectorAll("[CID]")))'
			style='border:1px solid silver;padding:4px;margin:4px 0;background:black;'>
			<div style='display:flex;flex-flow:row wrap;'>
				<span style="color:pink"><input type="checkbox" CID="EMA.5"/>EMA(週)</span>
				<span style="color:lightgreen"><input type="checkbox" CID="EMA.20"/>EMA(月)</span>
				<span style="color:lightblue"><input type="checkbox" CID="EMA.60"/>EMA(季)</span>
				<span style="color:orange"><input type="checkbox" CID="SMA.5"/>SMA(週)</span>
				<span style="color:yellow"><input type="checkbox" CID="SMA.20"/>SMA(月)</span>
				<span style="color:cyan"><input type="checkbox" CID="SMA.60"/>SMA(季)</span>
			</div>
			<div style='display:flex;flex-flow:row wrap;'>
				<span style="color:lightgreen"><input type="checkbox" CID="MACD.12.26.9"/>MACD</span>
			</div>
		</div>
		<div UID="Tags" style='border:1px solid silver;padding:4px;margin:4px 0;'>
			<div><button act='addTag'>加入</button> TOI 標籤管理區</div><hr/>
			<div UID="List">
			</div>
		</div>
	</aside>
	<section UID='View'>
		<section UID='Chart'>
			<svg UID='Canvas'></svg>
		</section>
		<section UID='Table'>
			<datalist id="StockIDs">
				<option>2330.TW 台積電</option>
			</datalist>
			<div style="text-align:center;">
				目標代號 <input varname='symbol' type="text" list='StockIDs'></input>
				從 <input varname="from" type="date" value='2025-01-01'/> 到 <input varname="to" type="date" value='2025-12-30'/>
				<button act="requestData">請求資料</button>
			</div>
			<table class='hidden' border='1' cellspacing='3' cellpadding='1' width='98%' align='center'>
				<thead><tr>
					<th vn='D'>Date</th>
					<th vn='C'>Close</th>
					<th vn='O'>Open</th>
					<th vn='H'>High</th>
					<th vn='L'>Low</th>
					<th vn='V'>Volume</th>
				</tr></thead>
				<tbody UID='Template'><tr>
					<th vn='D'></th>
					<td vn='C'></td>
					<td vn='O'></td>
					<td vn='H'></td>
					<td vn='L'></td>
					<td vn='V'></td>
				</tr></tbody>
				<tbody UID='List'></tbody>
			</table>
		</section>
	</section>
</main>

<footer>© Cyberpiers/CLUT/Porshen Lai 2026</footer>

<script>

	class StkChart extends window.Chart {
		printValues (s) {
			let k=Object.keys(App.CVs),v;
			k=k[parseInt(k.length*s)];
			v=Object.assign({"D":k},App.CVs[k]);
			Array.from(document.body.querySelector('[UID="RecordData"]').querySelectorAll('[fn]'))
			.forEach((e) => { e.textContent=v[e.getAttribute('fn')]; });
		}
		syncAPlots (cks) {
			if (!App.CVs) return;
			App.Chart.clear("A");
			cks.forEach((ck)=>{
				const args= ck.getAttribute("CID").split('.');
				const task= App["get"+args[0]];
				const draw= (("plot"+args[0]) in App.Chart) ? ("plot"+args[0]) : "plotLine" ;
				args[0]=Object.values(App.CVs).map((row)=>row.C)
				if (ck.checked)
					App.Chart[draw](task.apply(App,args),ck.parentNode.style.color);
			});
		}
		plotMACD (d, color)
		{	// {{{
			console.log("MACD data is ",d);
		}	// }}}
	}

	class StkData extends window.SData {
		async fetch (sid, year) {
			sid=sid.trim().replaceAll(/ .*/g,'');
			return { "data": await Service.requestData(sid,year) }
		}
	}

	App = {
		DB: {},
		CVs: {},
		Chart: new StkChart(document.querySelector('[UID="Canvas"]'),[]),
		getSMA: function(d, window=5)
		{ 	// 計算滑動平均 (SMA) {{{
			// @param {number} window - 視窗寬度 (5, 20, 60)
			// @returns {Array} - 長度與 data d 相同的陣列，未滿 window 處補 null 或 0
			if (d.length === 0) return [];

			let result = new Array(d.length).fill(Math.min(...d));
			for (let i=0,sum=0; i<d.length; i++) {
				sum += d[i];			// 加上新進入 window 的值
				if (i >= window)		// 如果 index 超過 window 寬度，減去離開 window 的舊值
					sum -= d[i - window];
				if (i >= window - 1)	// 當資料量足夠填滿一個 window 時，計算平均並填入
					result[i] = sum / window;
			}
			return result;
		},	// }}}
		getEMA (d, window=12)
		{	// 計算指數移動平均 (EMA) {{{
			// @param {number} window - 天數 (如 12, 26)
			// @returns {Array} - EMA 數值陣列
			if (d.length === 0) return [];
	
			let result = new Array(d.length);
			const alpha = 2 / (window + 1);

			// 1. 第一筆 EMA 通常直接用第一筆價格，或是用前 N 筆的 SMA 作為起點
			let ema = d[0];
			result[0] = ema;
			for (let i=1; i<d.length; i++) {
				// 2. 遞迴計算：今日 EMA = (今日價格 - 昨日 EMA) * alpha + 昨日 EMA
				ema = (d[i] - ema) * alpha + ema;
				result[i] = ema;
			}
			return result;
		},	// }}}
		getMACD (d, short=12, long=26, signal=9)
		{	// 計算 MACD 指標 {{{
			// @param {number} short - 快線週期 (預設 12)
			// @param {number} long - 慢線週期 (預設 26)
			// @param {number} signal - 訊號線週期 (預設 9)
			// @returns {Object} - 包含 dif, dea, hist 陣列

			const emaShort = this.getEMA(d, short);
			const emaLong = this.getEMA(d, long);
	
			// 1. 計算 DIF (快線 - 慢線)
			const dif = emaShort.map((s,i) => s - emaLong[i]);
			// 2. 計算 DEA (DIF 的 EMA)
			const dea = this.getEMA(dif,signal);
			// 3. 計算 Histogram (MACD 柱狀值)
			// 通常公式是 (DIF - DEA) * 2，乘以 2 是為了讓圖表視覺更明顯
			const hist = dif.map((d,i) => (d - dea[i]) * 2);
	
			return { dif, dea, hist };
		}	// }}}
	};

	const Service = {
		worker: null,
		promise: [],
		initWorker: function() {
			this.worker = new SharedWorker('shared_worker.js');
			this.worker.port.onmessage = (e) => {
				const { type, payload } = e.data;
				console.log(`[Worker Message]: ${type}`, payload);
			
				if (type === 'DATA_RESULT') {
					this.promise=this.promise.filter((ps)=>{
						if (ps.sessionKey===payload.key) {
							if (payload.status==="Success")
								ps.onReady(payload.data); 
							else
								ps.onError(payload);
							return false;
						} else
							return true;
					});
				}
				if (type === 'STATUS_UPDATE') {
					this.updateUIStatus(payload);
				}
	  	  	};
	  	  	this.worker.port.start();
		},
		requestData: function(symbol, year) {
			// gemini-helpme: 透過 SharedWorker 索取資料
			let cb={}, ps=new Promise((or,oe)=>{
				cb.sessionKey=(new Date()).getTime().toString(36);
				cb.onReady=or;
				cb.onError=oe;
			});
			Object.assign(ps, cb);
			this.promise.push(ps);
			this.worker.port.postMessage({
				type: 'FETCH_DATA',
				payload: { symbol, year, key:cb.sessionKey }
			});
			return ps;
		},
		updateUIStatus: function(msg) {
			document.querySelector("aside[UID='Control']").innerText = msg;
		}
	};
	Service.initWorker();

	document.body.UM = {
		manage: function() { console.log("User Management - Manage Clicked"); },
		logout: function() { console.log("User Management - Logout Clicked"); }
	};

	document.querySelector('main').DM = {
		// 資料管理物件後續實作
	};

	document.body.addEventListener('click', (evt) => { // {{{
		try {
			let p,e; 
			for(e=evt.target; !e.hasAttribute("act"); e=e.parentNode);
			switch (e.getAttribute('act')) {
			case 'addTag':
				((list)=>{
					if (!list.Data) list.Data=[];
					let key= document.body.querySelector('[UID="RecordData"] [fn="D"]').textContent;
					list.Data=list.Data.filter((v)=>v!==key);
					list.Data.push(key);
					list.Data=list.Data.sort();
					App.Chart.clear('T');
					list.innerHTML=list.Data.reduce((r,v)=>{
						App.Chart.plotTag(Object.keys(App.CVs).indexOf(v));
						return r+`<div TagValue="${v}"><button act="removeTag">X</button><span>${v}</span></div>`
					},"");
				})(document.body.querySelector('[UID="Tags"] [UID="List"]'));
				break;
			case 'removeTag':
				((list)=>{
					let key=e.parentNode.getAttribute("TagValue");
					list.Data=list.Data.filter((v)=>v!==key);
					list.removeChild(e.parentNode);
				})(document.body.querySelector('[UID="Tags"] [UID="List"]'));
				break;
			case 'requestData':
				try {
					for (p=e; p.getAttribute("UID")!=="Table"; p=p.parentNode) ;
					e.disabled=true;
					p.querySelector('table').classList.remove("hidden");
					(async (vars) => {
						const sid = vars.symbol;
						if (!App.DB[sid]) App.DB[sid]=new StkData(sid);
						let result = App.CVs = await App.DB[sid].get(vars.from,vars.to);
						if (result) {
							if (result.error) {
								p.querySelector('table').classList.add("hidden");
								e.disabled=false;
							} else {
								// DRAW DATA LIST TABLE
								const canvas=p.querySelector('[UID="List"]'),
									temp=p.querySelector('[UID="Template"]');
								while(canvas.firstChild) canvas.removeChild(canvas.firstChild);
								Object.keys(result).forEach(
									(k) => {
										let ne=temp.firstChild.cloneNode(true);
										Array.from(ne.querySelectorAll('[vn]')).forEach(
											(e) => {
												const an=e.getAttribute("vn");
												e.textContent= an==="D" ? k : result[k][an];
											}
										);
										canvas.appendChild(ne);
									}
								);
								e.disabled=false;
								App.Chart.clear();
								App.Chart.plotKC(
									Object.values(result).map((row)=>[row.O,row.C,row.H,row.L]),
									["#ff4444","#00ff44"]
								);

								App.Chart.finalized();
								App.Chart.zoom(document.body.querySelector('[UID="ZoomControl"]').value);
							}
						}
					})(
						Array.from(p.querySelectorAll('[varname]')).reduce((r,e) => {
							r[e.getAttribute("varname")]=((e)=>{
								switch(e.getAttribute("type")){
								case "month": return new Date(e.value+"-1");
								case "date": return new Date(e.value);
								default: return e.value;
								}
							})(e);
							return r;
						}, {})
					);
				} catch(x) {
					e.disabled=false;
				}
				break;
			}
		} catch { }
	});	// addEventListener(click) }}}
</script>

</body>
</html>
